<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Code Reviewer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">AI Code Reviewer</a>
        </div>
    </nav>
    <div id="loader-wrapper" class="d-none">
        <div class="spinner-wrapper">
            <div class="spinner"></div>
        </div>
    </div>
    <div class="container mt-4">
        <div class="form-floating">
            <textarea class="form-control text-area" placeholder="Leave a comment here" id="code-area"></textarea>
            <label for="code-area">Code</label>
        </div>

        <button type="button" class="btn btn-primary mt-3" onclick="submitCode()" id="review-button">Review</button>
        <button type="button" class="btn btn-secondary mt-3 d-none" onclick="reset()" id="reset-button">Reset</button>
    </div>

    <div id="code-bugs" class="container-fluid mt-4">
        <div class="row">
            <div class="col-3">
                <div class="card">
                    <div class="card-header">
                        Bugs <span id="bugs-badge" class="badge text-bg-danger d-none">0</span>
                    </div>
                    <ul id="bug-items" class="text-danger list-style">
                    </ul>
                    <div class="additional-issues"><span class="text-danger fw-bold">+ </span><span id="remaining-issues-bugs">0</span> more issues</div>
                </div>
            </div>
            <div class="col-3">
                <div class="card">
                    <div class="card-header">
                        Performance <span id="performance-badge" class="badge text-bg-warning d-none">0</span>
                    </div>
                    <ul id="performance-items" class="text-warning list-style">
                    </ul>
                    <div class="additional-issues"><span class="text-warning fw-bold">+ </span><span id="remaining-issues-performance">0</span> more issues</div>
                </div>
            </div>
            <div class="col-3">
                <div class="card">
                    <div class="card-header">
                        Security <span id="security-badge" class="badge text-bg-warning d-none">0</span>
                    </div>
                    <ul id="security-items" class="text-purple list-style">
                    </ul>
                    <div class="additional-issues"><span class="text-primary fw-bold">+ </span><span id="remaining-issues-security">0</span> more issues</div>
                </div>
            </div>
            <div class="col-3">
                <div class="card">
                    <div class="card-header">
                        Quality <span id="quality-badge" class="badge text-bg-primary d-none">0</span>
                    </div>
                    <ul id="quality-items" class="text-primary list-style">
                    </ul>
                    <div class="additional-issues"><span class="text-primary fw-bold">+ </span><span id="remaining-issues-quality">0</span> more issues</div>
                </div>
            </div>

        </div>
    </div>

    <script src="main.js"></script>
</body>

</html>
